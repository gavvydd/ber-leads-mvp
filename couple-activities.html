<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💑 Our Activities</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --match-bg: linear-gradient(135deg, #f953c6, #b91d73);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* ── SCREENS ── */
        .screen {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .screen.active { display: flex; }

        /* ── SELECT SCREEN ── */
        #screen-select { gap: 28px; }

        .logo { font-size: 3.5rem; }
        .select-title { font-size: 2rem; font-weight: 800; text-align: center; }
        .select-sub { font-size: 1rem; opacity: 0.65; text-align: center; }

        .user-buttons { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }

        .user-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 28px 36px;
            cursor: pointer;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            transition: all 0.25s;
            text-align: center;
            backdrop-filter: blur(12px);
            min-width: 140px;
        }
        .user-btn:hover {
            background: rgba(255,255,255,0.16);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
            border-color: rgba(255,255,255,0.45);
        }
        .user-btn .ub-emoji { font-size: 3rem; display: block; margin-bottom: 8px; }

        /* ── SWIPE SCREEN ── */
        .swipe-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(15,52,96,0.6);
            backdrop-filter: blur(10px);
        }

        .chip {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 7px 14px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .chip:hover { background: rgba(255,255,255,0.18); }

        .matches-chip {
            background: rgba(255,215,0,0.15);
            border-color: rgba(255,215,0,0.4);
            color: #FFD700;
        }
        .matches-chip:hover { background: rgba(255,215,0,0.25); }

        .card-container {
            position: fixed;
            top: 62px; bottom: 115px;
            left: 16px; right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── ACTIVITY CARD ── */
        .activity-card {
            position: absolute;
            width: 100%;
            max-width: 420px;
            height: 100%;
            max-height: 570px;
            border-radius: 26px;
            overflow: hidden;
            cursor: grab;
            user-select: none;
            box-shadow: 0 24px 64px rgba(0,0,0,0.45);
            background: white;
            color: #222;
            will-change: transform;
        }
        .activity-card.dragging { cursor: grabbing; transition: none !important; }
        .activity-card.fly-right {
            transition: transform 0.38s cubic-bezier(.55,.06,.68,.19), opacity 0.38s;
            transform: translateX(160%) rotate(32deg) !important;
            opacity: 0;
        }
        .activity-card.fly-left {
            transition: transform 0.38s cubic-bezier(.55,.06,.68,.19), opacity 0.38s;
            transform: translateX(-160%) rotate(-32deg) !important;
            opacity: 0;
        }
        .activity-card.snap-back {
            transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
        }

        .card-banner {
            height: 52%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.5rem;
            position: relative;
            flex-shrink: 0;
        }
        .card-cat-badge {
            position: absolute;
            top: 14px; left: 14px;
            background: rgba(0,0,0,0.28);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.72rem;
            color: white;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .card-body {
            padding: 18px 20px;
            height: 48%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .card-name { font-size: 1.35rem; font-weight: 800; margin-bottom: 3px; }
        .card-loc { font-size: 0.82rem; color: #777; margin-bottom: 10px; }
        .card-desc { font-size: 0.88rem; line-height: 1.55; color: #444; margin-bottom: 12px; }
        .card-pills { display: flex; gap: 7px; flex-wrap: wrap; }
        .pill {
            background: #f2f2f2;
            border-radius: 14px;
            padding: 4px 11px;
            font-size: 0.73rem;
            color: #555;
            font-weight: 500;
        }

        /* LIKE / NOPE stamps */
        .stamp {
            position: absolute;
            top: 28px;
            font-size: 2.2rem;
            font-weight: 900;
            border-radius: 8px;
            padding: 5px 14px;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            border-width: 4px;
            border-style: solid;
        }
        .stamp.like  { right: 18px; color: #27ae60; border-color: #27ae60; transform: rotate(15deg); }
        .stamp.nope  { left: 18px;  color: #e74c3c; border-color: #e74c3c; transform: rotate(-15deg); }

        /* ── ACTION BUTTONS ── */
        .action-buttons {
            position: fixed;
            bottom: 26px; left: 0; right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
        }
        .action-btn {
            width: 68px; height: 68px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            transition: all 0.22s;
        }
        .action-btn.nope  { box-shadow: 0 8px 24px rgba(231,76,60,0.35); }
        .action-btn.like  { box-shadow: 0 8px 24px rgba(39,174,96,0.35); }
        .action-btn.super { box-shadow: 0 8px 24px rgba(52,152,219,0.35); width: 52px; height: 52px; font-size: 1.4rem; }
        .action-btn:hover  { transform: scale(1.1); }
        .action-btn:active { transform: scale(0.93); }

        /* Progress */
        .progress-wrap {
            position: fixed;
            bottom: 108px; left: 20px; right: 20px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B, #4ECDC4);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        /* ── MATCH SCREEN ── */
        #screen-match {
            background: var(--match-bg);
            z-index: 200;
            gap: 18px;
            overflow-y: auto;
            justify-content: flex-start;
            padding-top: 40px;
        }
        .match-heading { font-size: 2.8rem; font-weight: 900; text-align: center; }
        .match-sub { font-size: 1rem; opacity: 0.9; text-align: center; }

        .match-card {
            background: white;
            color: #222;
            border-radius: 22px;
            padding: 22px;
            width: 100%;
            max-width: 400px;
        }
        .match-card-emoji  { font-size: 3.5rem; text-align: center; margin-bottom: 8px; }
        .match-card-name   { font-size: 1.45rem; font-weight: 800; text-align: center; margin-bottom: 4px; }
        .match-card-loc    { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 16px; }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .detail-box { background: #f6f6f6; border-radius: 14px; padding: 11px 13px; }
        .detail-lbl { font-size: 0.68rem; text-transform: uppercase; color: #999; font-weight: 700; margin-bottom: 3px; }
        .detail-val { font-size: 0.84rem; font-weight: 700; color: #222; }

        .tips-box { background: #fffbea; border: 1px solid #ffe07a; border-radius: 14px; padding: 12px 14px; }
        .tips-box h4 { font-size: 0.78rem; color: #7a5c00; font-weight: 700; margin-bottom: 7px; }
        .tips-box li { font-size: 0.8rem; color: #7a5c00; margin-bottom: 3px; list-style: none; }
        .tips-box li::before { content: "• "; }

        .match-btns { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .mbtn {
            flex: 1; padding: 15px; border-radius: 16px; border: none;
            font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .mbtn.ghost { background: rgba(255,255,255,0.2); color: white; }
        .mbtn.solid { background: white; color: #b91d73; }
        .mbtn:hover { opacity: 0.88; transform: translateY(-1px); }

        /* ── MATCHES LIST SCREEN ── */
        #screen-matches {
            justify-content: flex-start;
            padding: 72px 16px 24px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .matches-topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15,52,96,0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
        }
        .matches-topbar-title { font-size: 1.2rem; font-weight: 800; }

        .matches-list { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 14px; }

        .match-list-item {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 18px;
            backdrop-filter: blur(8px);
        }
        .mli-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
        .mli-icon {
            width: 58px; height: 58px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem;
            flex-shrink: 0;
        }
        .mli-info h3 { font-size: 1.05rem; font-weight: 800; }
        .mli-info p  { font-size: 0.78rem; opacity: 0.55; margin-top: 2px; }

        .mli-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mli-cell { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 9px 12px; }
        .mli-cell .lbl { font-size: 0.64rem; text-transform: uppercase; opacity: 0.45; font-weight: 700; }
        .mli-cell .val { font-size: 0.8rem; font-weight: 700; margin-top: 2px; }

        .mli-tips {
            margin-top: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px 12px;
        }
        .mli-tips .lbl { font-size: 0.64rem; text-transform: uppercase; opacity: 0.45; font-weight: 700; margin-bottom: 6px; }
        .mli-tips .tip { font-size: 0.78rem; opacity: 0.8; margin-bottom: 3px; }
        .mli-tips .tip::before { content: "• "; }

        .no-matches { text-align: center; opacity: 0.6; padding: 40px 0; }
        .no-matches .nm-emoji { font-size: 4rem; margin-bottom: 14px; }

        /* ── EMPTY SCREEN ── */
        #screen-empty { gap: 18px; text-align: center; }
        .empty-emoji  { font-size: 5rem; }
        .empty-title  { font-size: 1.9rem; font-weight: 800; }
        .empty-sub    { font-size: 1rem; opacity: 0.65; }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white; border: none; border-radius: 16px;
            padding: 15px 32px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.25s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(255,107,107,0.35); }

        .btn-ghost {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.25);
            color: white; border-radius: 16px;
            padding: 13px 28px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.25s;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.18); }

        /* ── CONFETTI ── */
        .confetti-layer {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 199;
        }
        .cf {
            position: absolute;
            animation: cf-fall linear forwards;
        }
        @keyframes cf-fall {
            0%   { transform: translateY(-30px) rotate(0deg);   opacity: 1; }
            100% { transform: translateY(105vh) rotate(800deg); opacity: 0; }
        }

        /* ── CARD GRADIENTS ── */
        .g1  { background: linear-gradient(135deg,#667eea,#764ba2); }
        .g2  { background: linear-gradient(135deg,#f093fb,#f5576c); }
        .g3  { background: linear-gradient(135deg,#4facfe,#00f2fe); }
        .g4  { background: linear-gradient(135deg,#43e97b,#38f9d7); }
        .g5  { background: linear-gradient(135deg,#fa709a,#fee140); }
        .g6  { background: linear-gradient(135deg,#a18cd1,#fbc2eb); }
        .g7  { background: linear-gradient(135deg,#ffecd2,#fcb69f); }
        .g8  { background: linear-gradient(135deg,#ff9a9e,#fad0c4); }
        .g9  { background: linear-gradient(135deg,#a1c4fd,#c2e9fb); }
        .g10 { background: linear-gradient(135deg,#d4fc79,#96e6a1); }
        .g11 { background: linear-gradient(135deg,#f7971e,#ffd200); }
        .g12 { background: linear-gradient(135deg,#30cfd0,#330867); }
    </style>
</head>
<body>

<!-- Confetti layer -->
<div class="confetti-layer" id="confetti-layer"></div>

<!-- ═══ SELECT SCREEN ═══ -->
<div class="screen active" id="screen-select">
    <div class="logo">💑</div>
    <div class="select-title">Our Activities</div>
    <div class="select-sub">Who's swiping right now?</div>
    <div class="user-buttons">
        <button class="user-btn" onclick="selectUser(0)">
            <span class="ub-emoji">🧑</span>
            Me
        </button>
        <button class="user-btn" onclick="selectUser(1)">
            <span class="ub-emoji">💗</span>
            My Babe
        </button>
    </div>
</div>

<!-- ═══ SWIPE SCREEN ═══ -->
<div class="screen" id="screen-swipe">
    <div class="swipe-header">
        <span class="chip" id="user-chip">🧑 Me</span>
        <button class="chip matches-chip" onclick="goMatches()">❤️ Matches <span id="match-count">0</span></button>
        <button class="chip" onclick="goSelect()">Switch</button>
    </div>

    <div class="card-container" id="card-container"></div>

    <div class="progress-wrap">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="action-buttons">
        <button class="action-btn nope" onclick="swipe('left')"  title="Nope">❌</button>
        <button class="action-btn super" onclick="swipe('super')" title="Super Like">⭐</button>
        <button class="action-btn like" onclick="swipe('right')" title="Like">💚</button>
    </div>
</div>

<!-- ═══ MATCH SCREEN ═══ -->
<div class="screen" id="screen-match">
    <div class="match-heading">🎉 It's a Match!</div>
    <div class="match-sub">You both want to do this one!</div>
    <div class="match-card" id="match-card"></div>
    <div class="match-btns">
        <button class="mbtn ghost" onclick="goSwipe()">Keep Swiping</button>
        <button class="mbtn solid" onclick="goMatches()">See All Matches</button>
    </div>
</div>

<!-- ═══ MATCHES LIST SCREEN ═══ -->
<div class="screen" id="screen-matches">
    <div class="matches-topbar">
        <button class="chip" onclick="goSwipe()">← Back</button>
        <span class="matches-topbar-title">❤️ Your Matches</span>
        <button class="chip" style="background:rgba(231,76,60,0.2);border-color:rgba(231,76,60,0.4);color:#e74c3c;font-size:0.75rem" onclick="confirmReset()">Reset</button>
    </div>
    <div class="matches-list" id="matches-list"></div>
</div>

<!-- ═══ EMPTY SCREEN ═══ -->
<div class="screen" id="screen-empty">
    <div class="empty-emoji">🎊</div>
    <div class="empty-title">All done!</div>
    <div class="empty-sub">Pass it to your partner to swipe through too</div>
    <button class="btn-primary" onclick="goMatches()">See Your Matches ❤️</button>
    <button class="btn-ghost" style="margin-top:8px" onclick="goSelect()">Switch User</button>
</div>

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const USERS       = ['Me', 'My Babe'];
const USER_EMOJIS = ['🧑', '💗'];

let currentUser = 0;
let isDragging   = false;
let startX = 0, startY = 0, moveX = 0;
let activeCard   = null;

// ── Storage helpers ──
function getSwipes(u) { return JSON.parse(localStorage.getItem(`swipes_${u}`) || '{}'); }
function saveSwipe(u, id, dir) {
    const s = getSwipes(u);
    s[id] = dir;
    localStorage.setItem(`swipes_${u}`, JSON.stringify(s));
}
function getMatches() { return JSON.parse(localStorage.getItem('matches') || '[]'); }
function saveMatch(id) {
    const m = getMatches();
    if (!m.includes(id)) { m.push(id); localStorage.setItem('matches', JSON.stringify(m)); }
}
function isMatch(id) {
    const s0 = getSwipes(0), s1 = getSwipes(1);
    return (s0[id] === 'right' || s0[id] === 'super') && (s1[id] === 'right' || s1[id] === 'super');
}

// ── Screen routing ──
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function goSelect() { showScreen('screen-select'); }

function selectUser(idx) {
    currentUser = idx;
    document.getElementById('user-chip').textContent = `${USER_EMOJIS[idx]} ${USERS[idx]}`;
    refreshMatchCount();
    goSwipe();
}

function goSwipe() {
    showScreen('screen-swipe');
    renderStack();
}

function goMatches() {
    renderMatchesList();
    showScreen('screen-matches');
}

// ── Render card stack ──
function unswiped() {
    const s = getSwipes(currentUser);
    return ACTIVITIES.filter(a => !s[a.id]);
}

function renderStack() {
    const container = document.getElementById('card-container');
    const cards = unswiped();

    if (cards.length === 0) { showScreen('screen-empty'); return; }

    container.innerHTML = '';

    // Render up to 3 cards (stack illusion), back to front
    const slice = cards.slice(0, 3);
    for (let i = slice.length - 1; i >= 0; i--) {
        const el = buildCard(slice[i]);
        el.style.zIndex = slice.length - i;
        if (i > 0) {
            const scale = 1 - i * 0.04;
            const ty    = i * 9;
            el.style.transform = `scale(${scale}) translateY(${ty}px)`;
            el.style.pointerEvents = 'none';
        }
        container.appendChild(el);
    }

    updateProgress(cards.length);
    attachDrag();
}

function buildCard(act) {
    const el = document.createElement('div');
    el.className = 'activity-card';
    el.dataset.id = act.id;
    el.innerHTML = `
        <div class="stamp like">LIKE 💚</div>
        <div class="stamp nope">NOPE ❌</div>
        <div class="card-banner ${act.g}">
            <span>${act.emoji}</span>
            <div class="card-cat-badge">${act.cat}</div>
        </div>
        <div class="card-body">
            <div class="card-name">${act.name}</div>
            <div class="card-loc">📍 ${act.loc}</div>
            <div class="card-desc">${act.desc}</div>
            <div class="card-pills">
                <span class="pill">💰 ${act.price}</span>
                <span class="pill">⏱ ${act.duration}</span>
                <span class="pill">📅 ${act.bestTime}</span>
            </div>
        </div>
    `;
    return el;
}

function updateProgress(remaining) {
    const pct = ((ACTIVITIES.length - remaining) / ACTIVITIES.length) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
}

function refreshMatchCount() {
    document.getElementById('match-count').textContent = getMatches().length;
}

// ── Drag logic ──
function attachDrag() {
    const container = document.getElementById('card-container');
    const top = container.querySelector('.activity-card:last-child');
    if (!top) return;
    activeCard = top;

    top.addEventListener('mousedown',  onDragStart);
    top.addEventListener('touchstart', onDragStart, { passive: true });
}

function onDragStart(e) {
    isDragging = true;
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX;
    startY = pt.clientY;
    moveX  = 0;
    activeCard.classList.add('dragging');

    document.addEventListener('mousemove',  onDragMove);
    document.addEventListener('mouseup',    onDragEnd);
    document.addEventListener('touchmove',  onDragMove, { passive: true });
    document.addEventListener('touchend',   onDragEnd);
}

function onDragMove(e) {
    if (!isDragging) return;
    const pt = e.touches ? e.touches[0] : e;
    moveX  = pt.clientX - startX;
    const moveY = (pt.clientY - startY) * 0.25;
    const rot   = moveX * 0.07;
    activeCard.style.transform = `translate(${moveX}px,${moveY}px) rotate(${rot}deg)`;

    const likeEl = activeCard.querySelector('.stamp.like');
    const nopeEl = activeCard.querySelector('.stamp.nope');
    if (moveX > 30) {
        likeEl.style.opacity = Math.min((moveX - 30) / 70, 1);
        nopeEl.style.opacity = 0;
    } else if (moveX < -30) {
        nopeEl.style.opacity = Math.min((-moveX - 30) / 70, 1);
        likeEl.style.opacity = 0;
    } else {
        likeEl.style.opacity = nopeEl.style.opacity = 0;
    }
}

function onDragEnd() {
    if (!isDragging) return;
    isDragging = false;

    document.removeEventListener('mousemove',  onDragMove);
    document.removeEventListener('mouseup',    onDragEnd);
    document.removeEventListener('touchmove',  onDragMove);
    document.removeEventListener('touchend',   onDragEnd);

    activeCard.classList.remove('dragging');

    const threshold = window.innerWidth * 0.28;
    if      (moveX >  threshold) commitSwipe('right');
    else if (moveX < -threshold) commitSwipe('left');
    else {
        activeCard.classList.add('snap-back');
        activeCard.style.transform = '';
        activeCard.querySelector('.stamp.like').style.opacity = 0;
        activeCard.querySelector('.stamp.nope').style.opacity = 0;
        activeCard.addEventListener('transitionend', () => activeCard.classList.remove('snap-back'), { once: true });
    }
}

// Button swipes
function swipe(dir) {
    if (!activeCard) return;
    moveX = dir === 'right' || dir === 'super' ? 300 : -300;
    commitSwipe(dir);
}

function commitSwipe(dir) {
    const id = parseInt(activeCard.dataset.id, 10);

    activeCard.classList.add(dir === 'left' ? 'fly-left' : 'fly-right');

    setTimeout(() => {
        saveSwipe(currentUser, id, dir);

        let matched = false;
        if (dir !== 'left') {
            if (isMatch(id)) { saveMatch(id); matched = true; }
        }

        refreshMatchCount();

        if (matched) {
            showMatchScreen(ACTIVITIES.find(a => a.id === id));
        } else {
            renderStack();
        }
    }, 360);
}

// ── Match screen ──
function showMatchScreen(act) {
    document.getElementById('match-card').innerHTML = `
        <div class="match-card-emoji">${act.emoji}</div>
        <div class="match-card-name">${act.name}</div>
        <div class="match-card-loc">📍 ${act.loc}</div>
        <div class="detail-grid">
            <div class="detail-box"><div class="detail-lbl">💰 Price</div><div class="detail-val">${act.price}</div></div>
            <div class="detail-box"><div class="detail-lbl">⏱ Duration</div><div class="detail-val">${act.duration}</div></div>
            <div class="detail-box"><div class="detail-lbl">📅 Best Time</div><div class="detail-val">${act.bestTime}</div></div>
            <div class="detail-box"><div class="detail-lbl">⭐ Level</div><div class="detail-val">${act.diff}</div></div>
        </div>
        ${act.tips ? `
        <div class="tips-box">
            <h4>💡 Tips & Need to Know</h4>
            <ul>${act.tips.map(t => `<li>${t}</li>`).join('')}</ul>
        </div>` : ''}
    `;
    launchConfetti();
    showScreen('screen-match');
}

// ── Matches list ──
function renderMatchesList() {
    const list    = document.getElementById('matches-list');
    const matches = getMatches();

    if (matches.length === 0) {
        list.innerHTML = `<div class="no-matches"><div class="nm-emoji">💔</div>
            <p style="font-size:1.1rem;font-weight:700">No matches yet!</p>
            <p style="margin-top:8px;font-size:0.85rem;opacity:0.7">Both of you need to swipe right on the same activity</p></div>`;
        return;
    }

    list.innerHTML = matches.map(id => {
        const a = ACTIVITIES.find(x => x.id === id);
        if (!a) return '';
        return `
        <div class="match-list-item">
            <div class="mli-header">
                <div class="mli-icon">${a.emoji}</div>
                <div class="mli-info">
                    <h3>${a.name}</h3>
                    <p>📍 ${a.loc}</p>
                </div>
            </div>
            <div class="mli-grid">
                <div class="mli-cell"><div class="lbl">💰 Price</div><div class="val">${a.price}</div></div>
                <div class="mli-cell"><div class="lbl">⏱ Duration</div><div class="val">${a.duration}</div></div>
                <div class="mli-cell"><div class="lbl">📅 Best Time</div><div class="val">${a.bestTime}</div></div>
                <div class="mli-cell"><div class="lbl">⭐ Level</div><div class="val">${a.diff}</div></div>
            </div>
            ${a.tips ? `
            <div class="mli-tips">
                <div class="lbl">💡 Tips</div>
                ${a.tips.map(t => `<div class="tip">${t}</div>`).join('')}
            </div>` : ''}
        </div>`;
    }).join('');
}

// ── Confetti ──
function launchConfetti() {
    const layer  = document.getElementById('confetti-layer');
    layer.innerHTML = '';
    const colors = ['#FF6B6B','#4ECDC4','#FFD700','#FF8E53','#a29bfe','#fd79a8','#00b894','#74b9ff'];

    for (let i = 0; i < 90; i++) {
        const el = document.createElement('div');
        el.className = 'cf';
        const size = Math.random() * 12 + 5;
        el.style.cssText = `
            left:${Math.random()*100}%;
            top:-20px;
            width:${size}px; height:${size}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            border-radius:${Math.random() > 0.5 ? '50%' : '3px'};
            animation-duration:${Math.random()*1.5+1.2}s;
            animation-delay:${Math.random()*0.6}s;
        `;
        layer.appendChild(el);
    }
    setTimeout(() => { layer.innerHTML = ''; }, 3500);
}

// ── Reset ──
function confirmReset() {
    if (confirm('Reset ALL swipes and matches? This cannot be undone.')) {
        localStorage.clear();
        refreshMatchCount();
        goSwipe();
    }
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
    if (!document.getElementById('screen-swipe').classList.contains('active')) return;
    if (e.key === 'ArrowRight') swipe('right');
    if (e.key === 'ArrowLeft')  swipe('left');
    if (e.key === 'ArrowUp')    swipe('super');
});

// ── Init ──
refreshMatchCount();
</script>
